<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display in html</title>
    <style>
        span{
            display: inline-block;
        }
        .hidden{
            visibility: hidden;
        }
    </style>
  </head>
  <body>
    <h2>Display</h2>
    <span
      >Lorem ipsum dolor sit amet consectetur adipisicing elit. Molestiae
      labore, cum incidunt pariatur veritatis, vel nihil tempore natus, nulla
      reprehenderit eligendi libero suscipit modi. Harum delectus natus nesciunt
      corrupti doloribus.</span
    >
    <h1 class="hidden">This is a hidden heading</h1>

  </body>
</html>
