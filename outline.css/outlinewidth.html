<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>outline width in css</title>
    <style>
        .thin{
            border: 1px solid black;
            border-style: solid;
            outline-width: thin;
            outline-color: red;
            padding: 5px;
            background-color: aliceblue;
            width: 500px;
            height: auto;
        }
        .medium{
            border: 1px solid black;
            border-style: solid;
            outline-width: medium;
            outline-color: red;
        }
        .thick{
            border: 1px solid black;
            border-style: solid;
            outline-width: thick;
            outline-color: red;
        }
        .thick4px{
            border: 1px solid black;
            border-style: solid;
            outline-width: 4px thick;
            outline-color: red;

        }

    </style>
</head>
<body>
    <p class="thin">Thin outline</p>
    <p class="medium">Medium outline</p>
    <p class="thick">Thick outline</p>
    <p class="thick4px">4pxthick</p>
    
</body>
</html>
