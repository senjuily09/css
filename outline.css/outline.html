<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>outline in css</title>
    <style>
        .dotted{
            border-style: dotted;
            padding: 10px;
            background-color: aliceblue;
            color: blue;
        }
        .dashed{
            border-style: dashed;
        }
        .solid{
            border-style: solid;
        }
        .double{
            border-style: double;
        }
        .groove{
            border-style: groove;
        }
        .ridge{
            border-style: ridge;
        }
        .inset{
            border-style: inset;
        }
        .outset{
            border-style: outset;
        }
    </style>
</head>
<body>
    <p class="dotted">Dotted outline</p>
    <p class="dashed">Dashed outline</p>
    <p class="solid">solid outline</p>
    <p class="double">Double outline</p>
    <p class="groove">Groove outline</p>
    <p class="ridge">Ridge outline </p>
    <p class="inset">Insert outline</p>
    <p class="outset">outset outline</p>
</body>
</html>
