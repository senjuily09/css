<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table size</title>
    <style>
        table,td,th {
            border: 1px solid black;
            border-collapse: collapse;
            width: 50%;
            margin: 20px;
        }
        th {
            height: 70px;
        }

    </style>
</head>
<body>
    
<table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
      <th>Savings</th>
    </tr>
    <tr>
      <td>name</td>
      <td>1</td>
      <td>$100</td>
    </tr>
    <tr>
      <td>name</td>
      <td>2</td>
      <td>$150</td>
    </tr>
    <tr>
      <td>name</td>
      <td>3</td>
      <td>$300</td>
    </tr>
    <tr>
      <td>name</td>
      <td>4</td>
      <td>$250</td>
    </tr>
  </table>
</body>
</html>
