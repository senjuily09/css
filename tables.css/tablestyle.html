<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>table styling</title>
    <style>
      table,
      td,
      th {
        border-bottom: 1px solid #ddd;
        text-align: left;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        padding: 15px;
      }
      th{
        background-color: black;
        color: white;
      }
      tr:hover {
        background-color: coral;
      }
      tr:nth-child(even) {background-color: #f2f2f2;}
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>1</th>
        <th>2</th>
        <th>3</th>
      </tr>
      <tr>
        <td>nameA</td>
        <td>nameB</td>
        <td>nameC</td>
      </tr>
      <tr>
        <td>nameD</td>
        <td>nmaeE</td>
        <td>nameF</td>
      </tr>
    </table>
  </body>
</html>
