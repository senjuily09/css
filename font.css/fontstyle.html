<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font style</title>
    <style>
        .p1{
            font-style: normal;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-variant: small-caps;
            color: blue;
            text-align: center;
        }
        .p2{
            font-style: oblique;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-weight: bolder;
            font-variant: normal;
            margin-top: 50px;
        }
        .p3{
            font-style: italic;
            padding: 10px;
            height: 5%;
            width: 10%;
            border: 10px;
            border-style: double;
            background-color: antiquewhite;
            border-color: aqua;

        }
    </style>
</head>
<body>
    <p class="p1">This is normal</p>
    <p class="p2">This is oblique</p>
    <p class="p3">This is italic </p>

</body>
</html>
